name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref (saves runner time on rapid pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Runs the full unit + integration suite. The Lua host links mlua's
      # vendored C (the runner's preinstalled gcc handles it); the Wasm host is
      # pure-Rust wasmtime. The fuchsia-actor-wasm integration test and the
      # example self-skip when the `cargo component` artifact under
      # test-components/actor-echo is absent, so the suite is green without a
      # wasm toolchain — hence there is no separate wasm-build job here.
      - name: Test
        run: cargo test --workspace

  book:
    name: mdbook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The book is plain Markdown — building it needs only the mdbook binaries,
      # no Rust toolchain. Install the prebuilt binaries rather than
      # `cargo install` (which would compile them) to keep this job fast. This
      # also catches broken SUMMARY.md links (e.g. a new RFC page that was
      # listed but not created). mdbook-mermaid is required because book.toml
      # declares the `mermaid` preprocessor (see reference/crate-map.md).
      - name: Install mdbook + mdbook-mermaid
        env:
          MDBOOK_VERSION: "0.5.2"
          MDBOOK_MERMAID_VERSION: "0.17.0"
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          curl -fsSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-v${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build the book
        run: mdbook build docs/book
